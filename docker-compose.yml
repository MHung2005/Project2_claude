services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # depends_on:
    #   - db
  
  frontend:
    build: 
      context: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
  
  redis:
    # BẮT BUỘC dùng redis-stack để có tính năng Vector Search
    image: redis/redis-stack:latest 
    ports:
      - "6379:6379"  # Cổng cho Backend kết nối
      - "8001:8001"  # Cổng cho giao diện Redis Insight 
    container_name: redis